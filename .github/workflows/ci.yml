name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (check + clippy + test)
    runs-on: windows-latest
    steps:
      # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
      # Example: actions/checkout@<full-commit-sha>  # v4
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
        # Example: dtolnay/rust-toolchain@<full-commit-sha>  # stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
        # Example: actions/cache@<full-commit-sha>  # v4
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit --deny warnings

  frontend:
    name: Frontend (build + lint + format)
    runs-on: windows-latest
    steps:
      # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
      # Example: actions/checkout@<full-commit-sha>  # v4
      - uses: actions/checkout@v4

      - name: Setup Node.js
        # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
        # Example: actions/setup-node@<full-commit-sha>  # v4
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  coverage-rust:
    name: Rust coverage
    runs-on: windows-latest
    steps:
      # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
      # Example: actions/checkout@<full-commit-sha>  # v4
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
        # Example: dtolnay/rust-toolchain@<full-commit-sha>  # stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Cache cargo registry
        # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
        # Example: actions/cache@<full-commit-sha>  # v4
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Run cargo-tarpaulin
        run: cargo tarpaulin --manifest-path src-tauri/Cargo.toml --out xml --output-dir coverage/
        continue-on-error: true

      - name: Upload coverage to Codecov
        # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
        # Example: codecov/codecov-action@<full-commit-sha>  # v4
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura.xml
          flags: rust
          name: rust-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  coverage-frontend:
    name: Frontend coverage
    runs-on: ubuntu-latest
    steps:
      # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
      # Example: actions/checkout@<full-commit-sha>  # v4
      - uses: actions/checkout@v4

      - name: Setup Node.js
        # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
        # Example: actions/setup-node@<full-commit-sha>  # v4
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run vitest with coverage
        run: npx vitest run --coverage
        continue-on-error: true

      - name: Upload coverage to Codecov
        # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
        # Example: codecov/codecov-action@<full-commit-sha>  # v4
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  tauri-smoke:
    name: Tauri Build (smoke test)
    runs-on: windows-latest
    # Only run on main branch pushes, not PRs (to keep PR CI fast)
    if: github.event_name == 'push'
    steps:
      # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
      # Example: actions/checkout@<full-commit-sha>  # v4
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
        # Example: dtolnay/rust-toolchain@<full-commit-sha>  # stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
        # Example: actions/setup-node@<full-commit-sha>  # v4
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache cargo
        # TODO: Pin to commit SHA for supply-chain security (CWE-1357)
        # Example: actions/cache@<full-commit-sha>  # v4
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-tauri-

      - name: Tauri build
        run: npm run tauri build